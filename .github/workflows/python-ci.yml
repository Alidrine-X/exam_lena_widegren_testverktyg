name: Python CI/CD

# Talar om när jobben ska köras. Denna inställning bevakar när man gör push eller pull request mot branchen "main".

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # 1. Hämta koden
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Installera Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip # Snabbar upp framtida körningar genom att cacha requirements

      # 3. Installera beroenden
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      # 4. Installera Playwrights webbläsare (Krävs för Behave-Playwright)
      - name: Install Playwright Browsers
        run: |
          python -m playwright install --with-deps

      # 5. Linting
      - name: Lint code with flake8
        run: |
          flake8 src tests

      # 6. Kör tester
      - name: Run tests with pytest
        run: |
          pytest --maxfail=1 --disable-warnings -q
      
      # 7. Kör Playwright-testerna via Behave
      - name: Run Playwright E2E tests with Behave
        run: |
          behave src/features/

# För CD behöver man ett jobb "deploy" som publicerar en ny version av appen, så den kan användas.